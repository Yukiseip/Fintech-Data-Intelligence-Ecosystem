apiVersion: 1

providers:
  - name: 'fintech-dashboards'
    orgId: 1
    folder: 'Fintech Analytics'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
