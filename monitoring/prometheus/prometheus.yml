global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    project: 'fintech-analytics'
    environment: 'local'

# Alerting config (optional: add Alertmanager when in production)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Load alert rules
rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'

  # Airflow metrics
  # - job_name: 'airflow'
