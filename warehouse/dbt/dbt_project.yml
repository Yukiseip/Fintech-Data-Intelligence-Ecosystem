name: 'fintech_analytics'
version: '1.0.0'
config-version: 2

profile: 'fintech_analytics'

model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

target-path:    "target"
clean-targets:  ["target", "dbt_packages"]

models:
  fintech_analytics:
    staging:
      +materialized: view
      +schema: staging
    marts:
      core:
        +materialized: table
        +schema: gold
      risk:
        +materialized: table
        +schema: gold

snapshots:
  fintech_analytics:
    +target_schema: gold

vars:
  # Lookback window used in mart models
  transaction_lookback_days: 30
