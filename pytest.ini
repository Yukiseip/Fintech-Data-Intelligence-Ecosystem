[pytest]
testpaths =
    processing/tests
    data_generator/tests
    orchestration/dags/tests
    tests/integration
    tests/performance

python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    integration: integration tests (require running Docker stack)
    performance:  performance / SLA tests
    slow:         tests that take > 30 seconds

addopts =
    -v
    --tb=short
    --strict-markers
    --cov=processing
    --cov=data_generator
    --cov=orchestration
    --cov-report=term-missing
    --cov-report=html:coverage_report
    --cov-fail-under=70

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
