[core]
dags_folder = /opt/airflow/dags
hostname_callable = socket.getfqdn
default_timezone = utc
executor = CeleryExecutor
load_examples = False
parallelism = 32
dag_concurrency = 16
max_active_tasks_per_dag = 16
max_active_runs_per_dag = 1
dags_are_paused_at_creation = True
enable_xcom_pickling = False
fernet_key = ${AIRFLOW_FERNET_KEY}

[logging]
base_log_folder = /opt/airflow/logs
remote_logging = False
log_format = %%(asctime)s - %%(name)s - %%(levelname)s - %%(message)s
colored_log_format = %%(levelname)-8s [%%(asctime)s] %%(filename)s:%%(lineno)d - %%(message)s
logging_level = INFO
fab_logging_level = WARN

[metrics]
statsd_on = False

[api]
auth_backends = airflow.api.auth.backend.session
enable_experimental_api = False

[operators]
default_owner = data-engineering
default_cpus = 1
default_ram = 512
default_disk = 512

[webserver]
base_url = http://localhost:8080
default_ui_timezone = UTC
expose_config = False
rbac = True
secret_key = ${AIRFLOW_SECRET_KEY}

[celery]
celery_app_name = airflow.executors.celery_executor
worker_concurrency = 16
broker_url = redis://:@redis:6379/0
result_backend = db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
flower_host = 0.0.0.0
flower_port = 5555

[scheduler]
scheduler_heartbeat_sec = 10
min_file_process_interval = 30
dag_dir_list_interval = 60
print_stats_interval = 30
max_threads = 2
catchup_by_default = False

[database]
sql_alchemy_conn = postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
sql_engine_encoding = utf-8
sql_alchemy_pool_enabled = True
sql_alchemy_pool_size = 5
sql_alchemy_max_overflow = 10
sql_alchemy_pool_recycle = 1800
sql_alchemy_pool_pre_ping = True

[smtp]
smtp_host = localhost
smtp_starttls = True
smtp_ssl = False
smtp_port = 25
smtp_mail_from = airflow@fintech-local.dev

[email]
email_backend = airflow.utils.email.send_email_smtp
